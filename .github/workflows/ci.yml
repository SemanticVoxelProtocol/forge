name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: tsc --noEmit
      - run: npm run lint
      - run: npm run format:check
      - run: npx vitest run
      - name: Coverage report
        if: matrix.node-version == 22
        run: npx vitest run --coverage --test-timeout=30000

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: tsc
      - name: Verify CLI entry point exists
        run: test -f dist/packages/cli/index.js
      - name: Smoke test
        run: node dist/packages/cli/index.js --help
